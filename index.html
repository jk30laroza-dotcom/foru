<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For You 🤍</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", sans-serif;
    background:#faf9f7;
    overflow:hidden;
    height:100vh;
}

/* HEARTS */
.hearts{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
}

.heart{
    position:absolute;
    bottom:-20px;
    color:#ff4f81;
    font-size:18px;
    animation: floatUp linear infinite;
    opacity:0.6;
}

@keyframes floatUp{
    0%{transform:translateY(0) scale(1);opacity:0;}
    10%{opacity:0.6;}
    100%{transform:translateY(-110vh) scale(1.3);opacity:0;}
}

/* PAGES */
.page{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:25px;
    opacity:0;
    transform:translateX(100%);
    transition:0.5s ease;
    z-index:2;
}

.active{
    opacity:1;
    transform:translateX(0);
}

h1{ font-weight:500; color:#222; }
p{ color:#777; }

/* BUTTONS */
button{
    padding:12px 20px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    margin:8px;
    font-size:15px;
    transition:0.2s ease;
}

.primary{ background:#222; color:white; }
.ghost{ background:#eee; }

.selected{
    background:#222 !important;
    color:white !important;
    transform:scale(1.05);
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* NO BUTTON */
#noBtn{
    position:absolute;
}

/* MUSIC */
#musicBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#222;
    color:white;
    padding:10px 14px;
    border-radius:50px;
    font-size:12px;
    z-index:5;
}

/* LIVE PREVIEW */
#livePreview{
    margin-top:15px;
    color:#555;
    font-size:14px;
}
</style>
</head>

<body>

<!-- HEARTS -->
<div class="hearts" id="hearts"></div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="toggleMusic()">🎵 Play</button>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <h1>Hi Angel 🤍</h1>

    <p style="color:#777; max-width:300px;">
        This will be my last two weeks in Manila...<br><br>
        Will you go out with me?
    </p>

    <button class="primary" onclick="startExperience()">Yes ❤️</button>
    <button class="ghost" id="noBtn">No 😅</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    <h1>Pick our date 📅</h1>

    <input type="date" id="datePick" style="padding:12px;border-radius:10px;border:1px solid #ddd;">

    <p>Time</p>
    <button class="ghost time" onclick="selectTime(this,'Morning')">Morning 🌤️</button>
    <button class="ghost time" onclick="selectTime(this,'Afternoon')">Afternoon ☀️</button>
    <button class="ghost time" onclick="selectTime(this,'Dinner')">Dinner 🌙</button>
    <button class="ghost time" onclick="selectTime(this,'Late Night')">Late Night 🌌</button>

    <p>Duration</p>
    <button class="ghost duration" onclick="selectDuration(this,'1 Day')">1 Day</button>
    <button class="ghost duration" onclick="selectDuration(this,'2 Days')">2 Days</button>

    <button class="primary" onclick="next(3)">Next →</button>

    <div id="livePreview"></div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
    <h1>Where do you want to go? 📍</h1>
    <p>Don’t worry, it’s on me 🤍</p>

    <button class="ghost place" onclick="selectPlace(this,'Mall')">Mall 🛍️</button>
    <button class="ghost place" onclick="selectPlace(this,'Cinema')">Cinema 🎬</button>
    <button class="ghost place" onclick="selectPlace(this,'Arcade')">Arcade 🎮</button>
    <button class="ghost place" onclick="selectPlace(this,'Staycation')">Staycation 🏨</button>

    <button class="primary" onclick="next(4)">Next →</button>

    <div id="livePreview"></div>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
    <h1>It’s a date ❤️</h1>
    <p>I’m so excited!</p>

    <div id="summary" style="color:#555;margin-top:20px;"></div>
</div>

<script>
let date="";
let time="";
let duration="";
let place="";

/* NAV */
function next(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page'+n).classList.add('active');

    if(n===4){
        document.getElementById("summary").innerHTML=`
        📅 Date: ${date||"Not set"}<br>
        🕒 Time: ${time||"Not set"}<br>
        ⏳ Duration: ${duration||"Not set"}<br>
        📍 Place: ${place||"Not set"}<br><br>
        Can’t wait to see you 🤍
        `;
    }
}

/* DATE */
document.getElementById("datePick").addEventListener("change",(e)=>{
    date=e.target.value;
    updatePreview();
});

/* SELECTION */
function clearGroup(cls){
    document.querySelectorAll("."+cls).forEach(btn=>{
        btn.classList.remove("selected");
    });
}

function selectTime(el,val){
    clearGroup("time");
    el.classList.add("selected");
    time=val;
    updatePreview();
    logSelection();
}

function selectDuration(el,val){
    clearGroup("duration");
    el.classList.add("selected");
    duration=val;
    updatePreview();
    logSelection();
}

function selectPlace(el,val){
    clearGroup("place");
    el.classList.add("selected");
    place=val;
    updatePreview();
    logSelection();
}

/* LIVE PREVIEW */
function updatePreview(){
    document.getElementById("livePreview").innerHTML=`
    📅 Date: ${date||"Not set"}<br>
    🕒 Time: ${time||"Not set"}<br>
    ⏳ Duration: ${duration||"Not set"}<br>
    📍 Place: ${place||"Not set"}
    `;
}

/* OPTION 2 - YOUR SECRET LOG */
function logSelection(){
    console.log("DATE:",date);
    console.log("TIME:",time);
    console.log("DURATION:",duration);
    console.log("PLACE:",place);

    // optional popup (you can remove if you don’t want interruptions)
    alert(`Selected:\n${date} | ${time} | ${duration} | ${place}`);
}

/* NO BUTTON */
const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    const x=Math.random()*(window.innerWidth-100);
    const y=Math.random()*(window.innerHeight-50);
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
});

/* MUSIC */
const music=document.getElementById("music");
let playing=false;

window.addEventListener("load",async()=>{
    try{
        await music.play();
        playing=true;
        document.getElementById("musicBtn").innerText="⏸ Pause";
    }catch(e){}
});

function startExperience(){
    next(2);
    if(!playing){
        music.play();
        playing=true;
        document.getElementById("musicBtn").innerText="⏸ Pause";
    }
}

function toggleMusic(){
    if(!playing){
        music.play();
        playing=true;
        document.getElementById("musicBtn").innerText="⏸ Pause";
    }else{
        music.pause();
        playing=false;
        document.getElementById("musicBtn").innerText="🎵 Play";
    }
}

/* HEARTS */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(12+Math.random()*20)+"px";
    heart.style.animationDuration=(4+Math.random()*4)+"s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(()=>heart.remove(),8000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
